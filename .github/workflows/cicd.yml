name: CI Formatting Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  formatting_check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------
      # Java Formatting (Google Java Format)
      # -------------------------------
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Google Java Format
        run: |
          curl -LJO https://github.com/google/google-java-format/releases/download/v1.17.0/google-java-format-1.17.0-all-deps.jar

      - name: Run Java Formatting Checks
        run: |
          echo "=== Running Google Java Format Check ==="
          # Check all Java files in the repo
          find . -name "*.java" | while read -r file; do
            java -jar "google-java-format-1.17.0-all-deps.jar" --dry-run "$file" || (echo "Format error in $file"; exit 1)
          done

      # -------------------------------
      # Global Prettier Setup (No tools folder)
      # -------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Global Formatters
        run: npm install -g prettier prettier-plugin-solidity

      - name: Run Global Prettier Check
        run: |
          echo "=== Running Global Prettier Check ==="
          NODE_GLOBAL=$(npm root -g)
          # Scans everything: JS, TS, JSON, HTML, CSS, Markdown, Solidity, and YAML
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
            --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

      - name: Finalize Check
        run: echo "All formatting checks completed successfully."

  # -------------------------------
  # Backend Tests (Java / Maven)
  # -------------------------------
  backend_tests:
    name: Backend Tests (Java / Maven)
    runs-on: ubuntu-latest
    needs: formatting_check

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Run all backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          echo "=== Running FinvaBank backend tests ==="
          mvn --batch-mode --no-transfer-progress \
            -P test \
            test \
            -Dspring.profiles.active=test

      - name: Collect and Publish Reports
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "**/surefire-reports/*.xml"
          check_name: "Backend Test Results"
          fail_on_failure: true
