name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1 -- Code Quality Checks
  # ============================================================
  code_quality_checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Google Java Format
        run: |
          curl -LJO https://github.com/google/google-java-format/releases/download/v1.17.0/google-java-format-1.17.0-all-deps.jar

      - name: Run Java Formatting Checks
        run: |
          echo "=== Running Google Java Format Check ==="
          find . -name "*.java" | while read -r file; do
            java -jar "google-java-format-1.17.0-all-deps.jar" --dry-run "$file" || (echo "Format error in $file"; exit 1)
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Global Formatters
        run: npm install -g prettier prettier-plugin-solidity

      - name: Run Global Prettier Check
        run: |
          echo "=== Running Global Prettier Check ==="
          NODE_GLOBAL=$(npm root -g)
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
            --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

  # ============================================================
  # Job 2 -- Backend Build (Maven Install)
  # ============================================================
  backend_build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: code_quality_checks

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build PayNext Microservices
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          echo "=== Compiling and Installing Microservices ==="
          mvn clean install -DskipTests -B -ntp

      - name: Upload Backend Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paynext-backend-jars
          path: "**/target/*.jar"
          retention-days: 7

  # ============================================================
  # Job 3 -- Backend Tests
  # ============================================================
  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend_build

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Run Backend Tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          echo "=== Running Tests with Active Profile: test ==="
          mvn test -Dspring.profiles.active=test -B -ntp

      - name: Collect and Publish Reports
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "**/surefire-reports/*.xml"
          check_name: "Backend Test Results"
          fail_on_failure: true

  # ============================================================
  # Job 4 -- Web Build
  # ============================================================
  web_build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: code_quality_checks

    defaults:
      run:
        working-directory: web-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web-frontend/dist/
          retention-days: 7
