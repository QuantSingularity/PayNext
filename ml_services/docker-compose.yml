version: "3.9"

x-common-build: &common-build
  context: .

services:
  fraud:
    build:
      <<: *common-build
      dockerfile: fraud/Dockerfile
    image: ml_services/fraud:latest
    container_name: fraud_service
    ports:
      - "8001:8001"
    volumes:
      - model_store:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  anomaly_detection:
    build:
      <<: *common-build
      dockerfile: anomaly_detection/Dockerfile
    image: ml_services/anomaly_detection:latest
    container_name: anomaly_detection_service
    ports:
      - "8002:8002"
    volumes:
      - model_store:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  churn:
    build:
      <<: *common-build
      dockerfile: churn/Dockerfile
    image: ml_services/churn:latest
    container_name: churn_service
    ports:
      - "8003:8003"
    volumes:
      - model_store:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
