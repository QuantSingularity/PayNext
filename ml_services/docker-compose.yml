      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  credit_scoring:
    build:
      <<: *common-build
      dockerfile: credit_scoring/Dockerfile
