      <<: *common-build
      dockerfile: recommendation/Dockerfile
    image: ml_services/recommendation:latest
    container_name: recommendation_service
    ports:
      - "8004:8004"
    volumes:
      - model_store:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
