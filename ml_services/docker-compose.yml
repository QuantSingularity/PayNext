      - model_store:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  data_analytics:
    build:
      <<: *common-build
      dockerfile: data_analytics/Dockerfile
    image: ml_services/data_analytics:latest
    container_name: data_analytics_service
    ports:
      - "8007:8007"
