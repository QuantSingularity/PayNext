server.port=8003

spring.application.name=user-service

eureka.client.service-url.defaultZone=http://localhost:8001/eureka/

spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyNotForProduction123456789}
jwt.expiration=604800000

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@paynext.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

twilio.account.sid=${TWILIO_ACCOUNT_SID:placeholder}
twilio.auth.token=${TWILIO_AUTH_TOKEN:placeholder}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1234567890}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

logging.level.com.fintech=DEBUG
logging.level.org.springframework.security=INFO
