<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>PayNext Notification</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 30px auto;
        background: #fff;
        border-radius: 8px;
        padding: 30px;
      }
      .header {
        background-color: #1a73e8;
        color: white;
        padding: 20px;
        border-radius: 8px 8px 0 0;
        text-align: center;
      }
      .body {
        padding: 20px;
        color: #333;
        line-height: 1.6;
      }
      .footer {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header"><h2>PayNext</h2></div>
      <div class="body">
        <p
          th:text="${message != null ? message : 'You have a new notification from PayNext.'}"
        >
          Default message
        </p>
      </div>
      <div class="footer">
        <p>&copy; 2024 PayNext. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
