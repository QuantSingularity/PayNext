spring.application.name=payment-service
server.port=8004

spring.datasource.url=jdbc:h2:mem:paymentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8001/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.org.springframework=INFO
logging.level.com.fintech.paymentservice=DEBUG
logging.level.feign=DEBUG
logging.level.com.fintech.paymentservice.client=DEBUG

feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

spring.cloud.openfeign.circuitbreaker.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
