global:
  namespace: paynext
  ingressClass: nginx
  compliance:
    pci: true
    gdpr: true
    sox: true
  security:
    networkPolicies: true
    podSecurityPolicies: true
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 10001
      fsGroup: 10001
    rbac:
      enabled: true

image:
  repository: quantsingularity
  pullPolicy: IfNotPresent
  tag: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

nodeSelector: {}
tolerations: []
affinity: {}

# ==============================================================================
# Microservices Configuration
# ==============================================================================
services:
  api-gateway:
    enabled: true
    replicaCount: 2
    image:
      repository: quantsingularity/backend-api-gateway
      tag: latest
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8002
          targetPort: 8002
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8002
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8002
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  eureka-server:
    enabled: true
    replicaCount: 2
    image:
      repository: quantsingularity/backend-eureka-server
      tag: latest
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8001
          targetPort: 8001
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8001
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8001
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  fintech-payment-frontend:
    enabled: true
    replicaCount: 2
    image:
      repository: quantsingularity/frontend-fintech-payment
      tag: latest
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 80
          targetPort: 80
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  notification-service:
    enabled: true
    replicaCount: 2
    image:
      repository: quantsingularity/backend-notification-service
      tag: latest
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8004
          targetPort: 8004
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8004
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8004
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  payment-service:
    enabled: true
    replicaCount: 2
    image:
      repository: quantsingularity/backend-payment-service
      tag: latest
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8003
          targetPort: 8003
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8003
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8003
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  user-service:
    enabled: true
    replicaCount: 2
    image:
      repository: quantsingularity/backend-user-service
      tag: latest
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8000
          targetPort: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# ==============================================================================
# Backup Configuration
# ==============================================================================
backup:
  storageClassName: "standard"
  storageSize: "10Gi"
  schedule: "0 1 * * *"
  retentionDays: 30
