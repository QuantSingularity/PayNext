  namespace: { { include "paynext.namespace" . } }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: paynext-viewer
subjects:
  - kind: ServiceAccount
    name: paynext-viewer-sa
    namespace: { { include "paynext.namespace" . } }
