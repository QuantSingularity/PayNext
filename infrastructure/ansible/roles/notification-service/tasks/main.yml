---
- name: Create notification-service directory
  file:
    path: "/opt/paynext/notification-service"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Ensure required packages are installed
  apt:
    name:
      - openjdk-17-jdk
      - unzip
    state: present
    update_cache: yes

- name: Configure Notification Service environment variables
  template:
    src: notification-service.env.j2
    dest: /etc/notification-service.env
    mode: "0640"
    owner: root
    group: root
  notify: Restart Notification Service

- name: Create Notification Service systemd service file
  template:
    src: notification-service.service.j2
    dest: /etc/systemd/system/notification-service.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Notification Service

- name: Reload systemd and enable notification-service
  systemd:
    name: notification-service
    daemon_reload: yes
    enabled: yes
    state: started
