---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install base packages
  apt:
    name: "{{ common_packages }}"
    state: present
  when: ansible_os_family == "Debian"

- name: Set timezone
  timezone:
    name: "{{ common_timezone }}"

- name: Set up message of the day
  template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"

- name: Configure system limits for JVM services
  pam_limits:
    domain: "*"
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: soft, item: nofile, value: "65536" }
    - { type: hard, item: nofile, value: "65536" }
    - { type: soft, item: nproc, value: "4096" }
    - { type: hard, item: nproc, value: "4096" }

- name: Ensure /opt/paynext directory exists
  file:
    path: /opt/paynext
    state: directory
    owner: root
    group: root
    mode: "0755"
