---
- name: Create user-service directory
  file:
    path: "/opt/paynext/user-service"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Ensure required packages are installed
  apt:
    name:
      - openjdk-17-jdk
      - unzip
    state: present
    update_cache: yes

- name: Set environment variables for user-service
  lineinfile:
    path: "/etc/environment"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
  loop:
    - { key: "USER_SERVICE_PORT", value: "{{ service_port }}" }
    - { key: "EUREKA_SERVER_URL", value: "{{ eureka_server_url }}" }
  notify: Restart user-service

- name: Deploy user-service systemd unit file
  template:
    src: "user-service.service.j2"
    dest: "/etc/systemd/system/user-service.service"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart user-service

- name: Reload systemd manager configuration
  systemd:
    daemon_reload: yes

- name: Enable and start user-service
  systemd:
    name: user-service
    enabled: yes
    state: started
