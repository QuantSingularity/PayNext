---
# Production Environment Variables
# All secrets MUST be provided via environment variables or Ansible Vault

# Database Configuration
db_host: "{{ lookup('env', 'DB_HOST') | mandatory }}"
db_port: 5432
db_name: "paynext_prod"
db_user: "{{ lookup('env', 'DB_USER') | mandatory }}"
db_password: "{{ lookup('env', 'DB_PASSWORD') | mandatory }}"

# Application Configuration
app_environment: "production"
log_level: "INFO"

# Service Ports
api_gateway_port: 8002
eureka_server_port: 8001
user_service_port: 8000
payment_service_port: 8003
notification_service_port: 8004

# Service Discovery
eureka_server_url: "http://eureka-server:8001/eureka"

# Feature Flags
enable_debug_mode: false
enable_ssl: true
