---
# Development Environment Variables
# Use Ansible Vault for sensitive values in real deployments

# Database Configuration
db_host: "{{ lookup('env', 'DB_HOST') | default('localhost') }}"
db_port: 5432
db_name: "paynext_dev"
db_user: "{{ lookup('env', 'DB_USER') | default('paynext') }}"
db_password: "{{ lookup('env', 'DB_PASSWORD') | mandatory }}"

# Application Configuration
app_environment: "development"
log_level: "DEBUG"

# Service Ports
api_gateway_port: 8002
eureka_server_port: 8001
user_service_port: 8000
payment_service_port: 8003
notification_service_port: 8004

# Service Discovery
eureka_server_url: "http://eureka-server:8001/eureka"

# Feature Flags
enable_debug_mode: true
enable_ssl: false
