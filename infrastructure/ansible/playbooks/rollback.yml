---
- name: Rollback PayNext Application
  hosts: all
  become: yes
  vars:
    docker_compose_path: "/opt/paynext/docker-compose.yml"
    health_check_url: "http://localhost:8002/actuator/health"
  tasks:
    - name: Stop Docker Compose services
      community.docker.docker_compose_v2:
        project_src: /opt/paynext
        state: absent
      ignore_errors: yes

    - name: Remove PayNext Docker images
      community.docker.docker_image:
        name: "{{ item }}"
        state: absent
        force_absent: yes
      loop:
        - "quantsingularity/backend-api-gateway"
        - "quantsingularity/backend-eureka-server"
        - "quantsingularity/backend-user-service"
        - "quantsingularity/backend-payment-service"
        - "quantsingularity/backend-notification-service"
        - "quantsingularity/frontend-fintech-payment"
      ignore_errors: yes

    - name: Clean up unused Docker resources
      command: docker system prune -f
      ignore_errors: yes

    - name: Verify services are down
      uri:
        url: "{{ health_check_url }}"
        method: GET
        status_code: [200, 404, 503]
      register: health_result
      ignore_errors: yes

    - name: Confirm rollback completed
      debug:
        msg: "Rollback completed. Services are no longer running."
      when: health_result.failed or health_result.status != 200
