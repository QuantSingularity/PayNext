---
- name: Deploy Notification Service
  hosts: notification_service
  become: true
  pre_tasks:
    - name: Validate required environment variables
      fail:
        msg: "DB_PASSWORD environment variable must be set"
      when: lookup('env', 'DB_PASSWORD') | length == 0
  roles:
    - role: notification-service
  vars:
    eureka_server_url: "http://eureka-server:8001/eureka"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    database_password: "{{ lookup('env', 'DB_PASSWORD') }}"
